<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Invitación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #69acee; }
    .form-container { max-width: 600px; margin: 50px auto; padding: 30px; border-radius: 10px; background: rgb(174, 249, 246); box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    .header { text-align: center; margin-bottom: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="header">
        <h2>Formulario de Invitación</h2>
        <p id="invitador-text" class="text-muted"></p>
      </div>
      
      <form id="invitacionForm">
        <input type="hidden" id="lote" name="lote">
        <input type="hidden" id="invitador" name="invitador">
        <input type="hidden" id="telefonoInvitador" name="telefonoInvitador">
        
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo*</label>
          <input type="text" class="form-control" id="nombre" name="nombre" required>
        </div>
        
        <div class="mb-3">
          <label for="dni" class="form-label">DNI*</label>
          <input type="text" class="form-control" id="dni" name="dni" required placeholder="XX.XXX.XXX">
        </div>
        
        <div class="mb-3">
          <label for="patente" class="form-label">Patente del vehículo</label>
          <input type="text" class="form-control" id="patente" name="patente" placeholder="XXX-XXX">
        </div>
        
        <div class="mb-3">
          <label for="telefono" class="form-label">Teléfono*</label>
          <input type="tel" class="form-control" id="telefono" name="telefono" required>
        </div>
        
        <div class="mb-3">
          <label for="email" class="form-label">Email (Requerido para el código QR)*</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="privacidad" required>
          <label class="form-check-label" for="privacidad">
            Acepto el tratamiento de mis datos según la política de privacidad
          </label>
        </div>
        
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Enviar Datos</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <script>
    // Inicializar EmailJS con tu User ID
    emailjs.init("F2yt1jfmdvtF48It0");

    // Configuración Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD8lSjoGXYBRo8HDm8fQtmJWT9FQrEVtHg",
      authDomain: "cube-b5537.firebaseapp.com",
      databaseURL: "https://cube-b5537-default-rtdb.firebaseio.com",
      projectId: "cube-b5537",
      storageBucket: "cube-b5537.appspot.com",
      messagingSenderId: "746288096117",
      appId: "1:746288096117:web:4a121eea0fc0e72fb5e93c",
      measurementId: "G-3HVP2KTDDX"
    };
    
    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Obtener parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const idPublico = urlParams.get('idPublico'); 
    
    // Número de guardia por defecto
    const telefonoGuardia = '5491112345678'; 
    
    if (idPublico) {
      db.collection("usuarios")
        .where("idPublico", "==", idPublico)
        .limit(1)
        .get()
        .then(querySnapshot => {
          if (!querySnapshot.empty) {
            const data = querySnapshot.docs[0].data();
            document.getElementById('lote').value = `${data.manzana}-${data.lote}`;
            document.getElementById('invitador').value = data.nombre;
            document.getElementById('telefonoInvitador').value = data.numerotelefono || '';
            document.getElementById('invitador-text').textContent = `Invitado por: ${data.nombre}`;
          } else {
            alert("❌ Enlace inválido o expirado.");
          }
        })
        .catch(error => {
          console.error("Error buscando al invitador:", error);
          alert("❌ No se pudo cargar el invitador. Intenta más tarde.");
        });
    } else {
      alert("❌ No se encontró ID de invitador en el enlace.");
    }

    document.getElementById('invitacionForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!document.getElementById('privacidad').checked) {
        alert('Debes aceptar la política de privacidad');
        return;
      }

      const formData = {
        nombre: document.getElementById('nombre').value.trim(),
        dni: document.getElementById('dni').value.trim(),
        patente: document.getElementById('patente').value.trim(),
        telefono: document.getElementById('telefono').value.trim(),
        email: document.getElementById('email').value.trim(),
        lote: document.getElementById('lote').value,
        invitador: document.getElementById('invitador').value,
        telefonoInvitador: document.getElementById('telefonoInvitador').value,
        fecha: new Date().toISOString(),
        estado: 'pendiente',
        ip: await obtenerIP(),
        
        // CAMPOS CLAVES PARA GUARDIA AÑADIDOS
        ingresado: false,
        fechaIngreso: null,
        fechaSalida: null
      };

      try {
        // CAMBIO IMPORTANTE: Guardamos en 'invitados' para sincronizar con la App React
        const docRef = await db.collection('invitados').add(formData);

        // LÓGICA DE ENVÍO AUTOMÁTICO DE QR POR EMAILJS
        if (formData.email) {
          const qrData = JSON.stringify({
            nombre: formData.nombre,
            dni: formData.dni,
            patente: formData.patente,
            lote: formData.lote,
            invitador: formData.invitador
          });
          
          // Generamos una URL de imagen dinámica del QR
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrData)}`;

          const templateParams = {
            nombre_invitado: formData.nombre,
            nombre_anfitrion: formData.invitador,
            lote: formData.lote,
            fecha: new Date().toLocaleDateString(),
            qr_image_url: qrUrl,
            email_invitado: formData.email
          };

          await emailjs.send("service_invitado", "template_listainvitados", templateParams);
        }

        // CONTINÚA EL FLUJO ORIGINAL HACIA WHATSAPP
        const telefonoDestino = formData.telefonoInvitador || telefonoGuardia;

        const mensajeWhatsApp = `📋 *Nueva Invitación Registrada* 📋

🔹 *Invitado:* ${formData.nombre}
🔹 *DNI:* ${formData.dni}
🔹 *Teléfono:* ${formData.telefono}
🔹 *Email:* ${formData.email || 'No especificado'}

🚗 *Vehículo:*
▸ Patente: ${formData.patente || 'No especificada'}

🏠 *Datos de Invitación:*
▸ Lote: ${formData.lote || 'No especificado'}
▸ Invitado por: ${formData.invitador || 'Directo'}

📅 Fecha: ${new Date().toLocaleString()}`;

        const mensajeCodificado = encodeURIComponent(mensajeWhatsApp);
        window.open(`https://wa.me/${telefonoDestino}?text=${mensajeCodificado}`, '_blank');

        alert('✅ Datos registrados y QR enviado a tu correo exitosamente. Se abrirá WhatsApp para confirmación.');
        document.getElementById('invitacionForm').reset();
      } catch (error) {
        console.error('Error:', error);
        alert('❌ Ocurrió un error. Por favor intenta nuevamente.');
      }
    });

    async function obtenerIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch {
        return 'no-disponible';
      }
    }
  </script>
</body>
</html>
